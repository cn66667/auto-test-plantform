name: API Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'api-test-cases/**'
      - 'api-test-core/**'
      - 'api-test-common/**'
      - 'pom.xml'
      - '.github/workflows/api-test.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'api-test-cases/**'
      - 'api-test-core/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
        
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Build project
      run: mvn clean install -DskipTests -B
      
    - name: Run API Tests
      run: mvn test -pl api-test-cases -B
      continue-on-error: true
      
    - name: Generate Allure Report
      if: always()
      run: |
        mvn allure:report -pl api-test-cases -B || true
        
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: api-test-cases/target/allure-report/
        retention-days: 30
        
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: api-test-cases/target/surefire-reports/
        retention-days: 30
        
    - name: Publish Test Results
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: API Test Results
        path: api-test-cases/target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: true
